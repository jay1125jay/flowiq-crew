<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowIQ Crew</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#020617;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

body{
  display:block;
}

.app{
  width:100%;
  max-width:430px;
  min-height:100vh;
  margin:0 auto;
  padding:20px;
}
.card{background:#0f172a;border-radius:20px;padding:20px;margin-bottom:15px}
button{width:100%;padding:16px;border:none;border-radius:14px;background:#2563eb;color:white;font-size:16px;font-weight:bold;margin-top:10px}
input,select{width:100%;padding:14px;border-radius:14px;border:none;background:#1e293b;color:white;margin-top:10px}
.title{font-size:24px;font-weight:bold;margin-bottom:10px}
.sub{color:#94a3b8;margin-bottom:10px}
.job{background:#111c31;padding:15px;border-radius:16px;margin-top:12px}
</style>
</head>
<body>
<div class="app">
<div class="card">
<div class="title">FlowIQ Crew</div>
<div class="sub">실시간 일용직 플랫폼</div>
</div>

<div class="card">
<div class="title">공고 생성</div>
<input id="title" placeholder="공고명">
<input id="location" placeholder="위치">
<input id="salary" placeholder="일급">

<label style="display:block;margin-top:15px">지원 언어</label>
<select id="fLang">
<option value="한국어">한국어</option>
<option value="한국어 / English">영어</option>
<option value="한국어 / Монгол">몽골어</option>
<option value="한국어 / Tiếng Việt">베트남어</option>
<option value="한국어 / ไทย">태국어</option>
<option value="한국어 / 中文">중국어</option>
<option value="한국어 / Русский">러시아어</option>
<option value="한국어 / नेपाली">네팔어</option>
<option value="한국어 / Oʻzbek">우즈베크어</option>
</select>

<button onclick="createJob()">공고 저장</button>
</div>

<div class="card">
<div class="title">공고 목록</div>
<div id="jobs"></div>
</div>

<script>
const SUPABASE_URL="https://zhbzphvqiiijfjqnktlo.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoYnpwaHZxaWlpamZqcW5rdGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDEwNTcsImV4cCI6MjA5NDYxNzA1N30.ufIPHJh2fzRLm5taos3yTz6pGlEHFKaSoYI2Ref3T5I";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function loadJobs(){
const {data}=await db.from('jobs').select('*').order('created_at',{ascending:false});
const el=document.getElementById('jobs');
el.innerHTML='';
(data||[]).forEach(job=>{
const div=document.createElement('div');
div.className='job';
div.innerHTML=`<b>${job.title}</b><br>📍 ${job.location}<br>💰 ${job.salary}원<br>🌐 ${job.language}`;
el.appendChild(div);
});
}

async function createJob(){
const title=document.getElementById('title').value;
const location=document.getElementById('location').value;
const salary=document.getElementById('salary').value;
const language=document.getElementById('fLang').value;

if(!title||!location||!salary){alert('입력하세요');return;}

await db.from('jobs').insert({
title:title,
location:location,
work_time:'09:00 - 18:00',
salary:Number(salary),
needed:5,
applied:0,
language:language,
type:'기타'
});

alert('저장 완료');
loadJobs();
}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('./service-worker.js');
}

loadJobs();
</script>
</div>
</body>
</html>
