<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowIQ Crew MVP</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at top left,rgba(59,130,246,.16),transparent 32%),
    radial-gradient(circle at bottom right,rgba(168,85,247,.12),transparent 28%),
    #020617;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  overflow-x:hidden;
}
body{display:flex;justify-content:center}
.app{
  width:100%;
  max-width:440px;
  min-height:100vh;
  padding:26px 18px 110px;
}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.brand{
  font-size:30px;
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.tagline{
  color:#94a3b8;
  font-size:13px;
  margin-top:5px;
  letter-spacing:.3px;
}
.icon-box{width:48px;height:48px;border-radius:18px;background:rgba(37,99,235,.18);display:flex;align-items:center;justify-content:center;font-size:24px}
.card{
  background:
    linear-gradient(180deg,rgba(15,23,42,.96) 0%,rgba(17,24,39,.96) 100%);
  border:1px solid rgba(148,163,184,.10);
  border-radius:30px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:
    0 14px 38px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.035);
  backdrop-filter:blur(14px);
}
.title{font-size:21px;font-weight:800;margin-bottom:6px}
.sub{color:#94a3b8;font-size:14px;line-height:1.45}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
button{
  border:0;
  color:white;
  background:#1e293b;
  border-radius:24px;
  min-height:58px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.18s ease;
  box-shadow:0 6px 20px rgba(0,0,0,.22);
}

button:active{
  transform:scale(.98);
}
.blue{background:#2563eb}.green{background:#059669}.gray{background:#334155}.red{background:#dc2626}
.big{min-height:78px;font-size:18px;width:100%;margin-bottom:12px}
.action{
  min-height:108px;
  background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
  border:1px solid rgba(255,255,255,.05);
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
  justify-content:center;
  border-radius:28px;
  box-shadow:0 10px 26px rgba(0,0,0,.22);
}
.action .emoji{
  font-size:32px;
  filter:drop-shadow(0 4px 10px rgba(59,130,246,.25));
}
.section{
  font-size:22px;
  font-weight:900;
  margin:28px 0 14px;
  letter-spacing:-.5px;
}
.job-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  margin-bottom:14px;
}
.job-title{
  font-size:20px;
  font-weight:900;
  line-height:1.3;
  letter-spacing:-.4px;
}
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:88px;
  height:42px;
  padding:0 16px;
  border-radius:18px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  font-size:14px;
  font-weight:900;
  box-shadow:0 8px 20px rgba(37,99,235,.35);
}
.type{
  display:inline-flex;
  align-items:center;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(59,130,246,.14);
  color:#93c5fd;
  font-size:12px;
  margin-top:8px;
  font-weight:800;
}
.info{
  color:#cbd5e1;
  font-size:14px;
  margin:12px 0;
  line-height:1.5;
}
.full{width:100%}
.metric-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.metric{
  background:rgba(15,23,42,.92);
  border-radius:24px;
  padding:18px 10px;
  text-align:center;
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.metric b{
  display:block;
  font-size:28px;
  font-weight:900;
  margin-bottom:4px;
  letter-spacing:-1px;
}
.metric span{color:#94a3b8;font-size:12px}
.worker-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.worker-name{font-weight:800}
.worker-meta{color:#94a3b8;font-size:13px;margin-top:4px}
.status{
  min-width:96px;
  min-height:78px;
  padding:10px 12px;
  border-radius:22px;
  font-size:16px;
  line-height:1.25;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  white-space:normal;
  word-break:keep-all;
  flex-direction:column;
  gap:6px;
}

.ok{
  background:linear-gradient(135deg,rgba(16,185,129,.22),rgba(5,150,105,.16));
  color:#34d399;
  border:1px solid rgba(52,211,153,.28);
  box-shadow:0 8px 24px rgba(16,185,129,.12);
}

.checked{
  background:linear-gradient(135deg,rgba(59,130,246,.24),rgba(37,99,235,.18));
  color:#60a5fa;
  border:1px solid rgba(96,165,250,.30);
  box-shadow:0 8px 24px rgba(59,130,246,.14);
}

.rejected{
  background:linear-gradient(135deg,rgba(239,68,68,.20),rgba(185,28,28,.15));
  color:#f87171;
  border:1px solid rgba(248,113,113,.26);
  box-shadow:0 8px 24px rgba(239,68,68,.12);
}

.wait{
  background:linear-gradient(135deg,rgba(148,163,184,.16),rgba(71,85,105,.14));
  color:#cbd5e1;
  border:1px solid rgba(203,213,225,.16);
  box-shadow:0 8px 24px rgba(15,23,42,.14);
}
.notice{
  background:linear-gradient(135deg,rgba(37,99,235,.18),rgba(59,130,246,.08));
  border:1px solid rgba(96,165,250,.22);
  box-shadow:0 10px 30px rgba(37,99,235,.12);
}
.hidden{display:none}
.back{width:100%;margin-top:12px;background:#334155}
input,select{
  width:100%;
  min-height:56px;
  margin:8px 0 14px;
  padding:0 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(15,23,42,.92);
  color:white;
  font-size:15px;
  outline:none;
  transition:.18s ease;
}

input:focus,
select:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}
label{display:block;color:#cbd5e1;font-size:13px;font-weight:700}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 14px}
.lang-option{display:flex;align-items:center;gap:8px;background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;color:#e2e8f0;font-size:14px;font-weight:700}
.lang-option input{width:auto;min-height:auto;margin:0}
.qr-box{
  width:240px;
  height:240px;
  margin:24px auto;
  background:white;
  color:#020617;
  border-radius:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:132px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  padding:14px;
}
.bottom-nav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:calc(100% - 24px);max-width:430px;background:rgba(15,23,42,.94);border:1px solid #1e293b;border-radius:26px;padding:10px;display:none;grid-template-columns:repeat(4,1fr);gap:8px}
.bottom-nav button{
  min-height:58px;
  border-radius:20px;
  font-size:12px;
  background:#020617;
  color:#cbd5e1;
  font-weight:700;
  border:1px solid rgba(255,255,255,.04);
}

.bottom-nav button.active{
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  box-shadow:0 8px 22px rgba(37,99,235,.38);
}
.bottom-nav button.active{background:#2563eb;color:white}
.top-actions{display:flex;gap:8px;margin-bottom:14px}
.top-actions button{
  flex:1;
  min-height:46px;
  border-radius:18px;
  font-size:13px;
  font-weight:800;
  background:rgba(15,23,42,.92);
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 6px 18px rgba(0,0,0,.18);
}
#languageGrid button{background:linear-gradient(180deg,#0f172a 0%,#111827 100%);border:1px solid rgba(255,255,255,.05);}
#languageScreen .notice{
  margin-top:18px;
}
#languageGrid button{
  min-height:72px;
  font-size:16px;
}


#languageGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:20px;
}
#languageGrid button{
  min-height:72px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:#0f172a;
  color:white;
  font-size:16px;
  font-weight:700;
}


.worker-hero{
  background:
    radial-gradient(circle at top right,rgba(59,130,246,.20),transparent 38%),
    linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.98));
  border:1px solid rgba(96,165,250,.18);
  border-radius:34px;
  padding:24px;
  margin-bottom:16px;
  box-shadow:0 18px 44px rgba(0,0,0,.34);
}
.worker-status-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 13px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  margin-bottom:14px;
}
.pill-ready{background:rgba(148,163,184,.16);color:#cbd5e1;border:1px solid rgba(203,213,225,.16)}
.pill-pending{background:rgba(245,158,11,.16);color:#fbbf24;border:1px solid rgba(251,191,36,.22)}
.pill-approved{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(52,211,153,.24)}
.pill-checked{background:rgba(59,130,246,.20);color:#60a5fa;border:1px solid rgba(96,165,250,.28)}
.pill-rejected{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(248,113,113,.24)}
.worker-hero-title{font-size:28px;font-weight:950;letter-spacing:-.8px;margin-bottom:8px}
.worker-hero-sub{font-size:14px;color:#94a3b8;line-height:1.5}
.worker-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.worker-mini-card{
  background:rgba(15,23,42,.70);
  border:1px solid rgba(148,163,184,.10);
  border-radius:22px;
  padding:15px;
}
.worker-mini-card b{display:block;font-size:18px;margin-top:5px}
.worker-mini-card span{font-size:12px;color:#94a3b8}
.today-site-card{
  background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(17,24,39,.96));
  border:1px solid rgba(148,163,184,.12);
  border-radius:30px;
  padding:22px;
  margin-bottom:16px;
}
.worker-actions-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.worker-actions-row button{min-height:54px;border-radius:20px;font-size:14px}


.map-choice{
  position:fixed;
  left:50%;
  bottom:96px;
  transform:translateX(-50%);
  width:calc(100% - 28px);
  max-width:420px;
  background:rgba(15,23,42,.98);
  border:1px solid rgba(148,163,184,.18);
  border-radius:28px;
  padding:18px;
  box-shadow:0 18px 46px rgba(0,0,0,.45);
  z-index:9999;
}
.map-choice.hidden{display:none}
.map-choice-title{
  font-size:18px;
  font-weight:900;
  margin-bottom:6px;
}
.map-choice-sub{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:14px;
}
.map-choice-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.map-choice-grid button{
  min-height:56px;
  border-radius:18px;
  font-size:14px;
}


.manager-summary-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}
.manager-summary-card{
  background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(17,24,39,.96));
  border:1px solid rgba(148,163,184,.12);
  border-radius:26px;
  padding:18px;
}
.manager-summary-card .label{
  color:#94a3b8;
  font-size:13px;
}
.manager-summary-card .value{
  font-size:28px;
  font-weight:950;
  margin-top:6px;
}
.manager-summary-card .mini{
  font-size:12px;
  color:#64748b;
  margin-top:6px;
}
.manager-todo{
  background:linear-gradient(180deg,rgba(30,41,59,.96),rgba(15,23,42,.96));
  border:1px solid rgba(96,165,250,.16);
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
}
.manager-todo-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
}
.todo-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  color:#cbd5e1;
}


.status-live-bar{
  display:flex;
  gap:8px;
  overflow:auto;
  margin-top:16px;
}
.status-step{
  flex:1;
  min-width:90px;
  background:rgba(15,23,42,.72);
  border:1px solid rgba(148,163,184,.10);
  border-radius:18px;
  padding:12px;
  text-align:center;
  font-size:12px;
}
.status-step.active{
  border-color:rgba(52,211,153,.35);
  background:rgba(16,185,129,.14);
  color:#34d399;
}
.manager-urgent{
  background:rgba(239,68,68,.12);
  border:1px solid rgba(248,113,113,.20);
  color:#fecaca;
  border-radius:18px;
  padding:12px;
  margin-top:10px;
  font-size:13px;
  font-weight:700;
}


.master-danger{
  background:rgba(239,68,68,.12);
  border:1px solid rgba(248,113,113,.22);
  color:#fecaca;
  border-radius:18px;
  padding:12px;
  margin-top:12px;
  font-size:13px;
  font-weight:800;
}
.master-delete-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}
.master-delete-row button{
  min-height:48px;
  border-radius:18px;
  font-size:13px;
}


.urgent-banner{
  background:linear-gradient(90deg,rgba(239,68,68,.18),rgba(245,158,11,.18));
  border:1px solid rgba(248,113,113,.25);
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
}
.urgent-banner .title{
  font-size:18px;
  font-weight:900;
}
.live-alert{
  background:rgba(59,130,246,.12);
  border:1px solid rgba(96,165,250,.20);
  color:#bfdbfe;
  border-radius:18px;
  padding:12px;
  margin-top:12px;
  font-size:13px;
  font-weight:700;
}
.fast-approve-bar{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.fast-approve-bar button{
  flex:1;
  min-height:48px;
  border-radius:18px;
}


.notice-center{
  background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(17,24,39,.96));
  border:1px solid rgba(96,165,250,.18);
  border-radius:26px;
  padding:18px;
  margin-bottom:18px;
}
.notice-item{
  background:rgba(15,23,42,.72);
  border:1px solid rgba(148,163,184,.10);
  border-radius:18px;
  padding:12px;
  margin-top:10px;
  font-size:13px;
}
.translate-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 12px;
  border-radius:999px;
  background:rgba(59,130,246,.16);
  color:#bfdbfe;
  font-size:12px;
  font-weight:800;
  margin-top:10px;
}


.shift-board{
  background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(17,24,39,.98));
  border:1px solid rgba(148,163,184,.12);
  border-radius:28px;
  padding:18px;
  margin-bottom:18px;
}
.shift-board-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.shift-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 12px;
  border-radius:999px;
  background:rgba(16,185,129,.14);
  color:#6ee7b7;
  font-size:12px;
  font-weight:800;
}
.shift-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(148,163,184,.08);
}
.shift-row:first-child{
  border-top:none;
}
.shift-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.shift-time{
  font-size:13px;
  color:#94a3b8;
}
.shift-site{
  font-size:16px;
  font-weight:800;
}
.shift-state{
  font-size:12px;
  font-weight:800;
  color:#60a5fa;
}


.manager-filter{
  background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(17,24,39,.98));
  border:1px solid rgba(148,163,184,.12);
  border-radius:28px;
  padding:18px;
  margin-bottom:18px;
}
.manager-filter-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
.manager-filter button{
  min-height:48px;
  border-radius:18px;
  font-size:13px;
}
.manager-filter input{
  margin-top:12px;
}


.worker-wallet{
  background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(15,23,42,.98));
  border:1px solid rgba(52,211,153,.22);
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
}
.wallet-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
}
.wallet-label{
  color:#a7f3d0;
  font-size:13px;
}
.wallet-value{
  font-size:28px;
  font-weight:950;
}
.wallet-mini{
  color:#94a3b8;
  font-size:12px;
  margin-top:6px;
}


.live-crew-board{
  background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(17,24,39,.98));
  border:1px solid rgba(59,130,246,.18);
  border-radius:28px;
  padding:18px;
  margin-bottom:18px;
}
.live-crew-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(148,163,184,.08);
}
.live-crew-row:first-child{
  border-top:none;
}
.live-badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}
.live-green{
  background:rgba(16,185,129,.16);
  color:#6ee7b7;
}
.live-blue{
  background:rgba(59,130,246,.16);
  color:#93c5fd;
}


.smart-alert-board{
  background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));
  border:1px solid rgba(251,191,36,.18);
  border-radius:28px;
  padding:18px;
  margin-bottom:18px;
}
.smart-alert-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(148,163,184,.08);
}
.smart-alert-item:first-child{
  border-top:none;
}
.smart-alert-badge{
  padding:6px 12px;
  border-radius:999px;
  background:rgba(245,158,11,.16);
  color:#fde68a;
  font-size:11px;
  font-weight:900;
}


.worker-rank-board{
  background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(17,24,39,.98));
  border:1px solid rgba(168,85,247,.18);
  border-radius:28px;
  padding:18px;
  margin-bottom:18px;
}
.rank-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-top:1px solid rgba(148,163,184,.08);
}
.rank-row:first-child{
  border-top:none;
}
.rank-badge{
  padding:6px 12px;
  border-radius:999px;
  background:rgba(168,85,247,.16);
  color:#ddd6fe;
  font-size:11px;
  font-weight:900;
}

    return;
  }

  workerName=name;
  workerPhone=phone;

  localStorage.setItem("worker_name",name);
  localStorage.setItem("worker_phone",phone);

  const pendingCheckin=localStorage.getItem("pending_checkin");
  if(pendingCheckin){
    localStorage.removeItem("pending_checkin");
    location.href=location.origin+location.pathname+"?checkin="+pendingCheckin;

  }

  goScreen("workerScreen");

  async function loadData(){
  let jobsQuery=db.from("jobs").select("*");

  let attendanceQuery=db.from("attendance").select("*");

  if(role==="manager"){
    jobsQuery=jobsQuery.eq("company_id",companyId);
    applicationsQuery=applicationsQuery.eq("company_id",companyId);
    attendanceQuery=attendanceQuery.eq("company_id",companyId);

  if(role==="worker" && workerPhone){
    applicationsQuery=applicationsQuery.eq("phone",workerPhone);
    attendanceQuery=attendanceQuery.eq("phone",workerPhone);

  const jr=await jobsQuery.order("created_at",{ascending:false});

  if(jr.error)alert("jobs 오류: "+jr.error.message);

  applications=ar.data||[];

function getMyCurrentApplication(){
  if(!workerPhone)return null;

  const active=applications.find(a=>
    a.phone===workerPhone &&
    ["지원","승인","출근완료"].includes((a.status || "지원").trim())
  );

  return active || applications.find(a=>a.phone===workerPhone) || null;
}

function getStatusMeta(status){
  if(status==="지원"){
    return {label:"지원 대기",icon:"🟡",pill:"pill-pending",title:"승인 대기중",desc:"관리자 승인을 기다리고 있습니다."};
  }

  if(status==="승인"){
    return {label:"승인 완료",icon:"🟢",pill:"pill-approved",title:"출근 준비 완료",desc:"오늘 현장으로 이동 후 QR 출근을 진행하세요."};
  }

  if(status==="출근완료"){
    return {label:"출근 완료",icon:"🔵",pill:"pill-checked",title:"근무 진행중",desc:"출근 기록이 저장되었습니다. 급여 화면에서 예상 금액을 확인하세요."};
  }

  if(status==="거절"){
    return {label:"거절",icon:"🔴",pill:"pill-rejected",title:"다른 공고 지원 가능",desc:"해당 공고는 거절되었습니다. 다른 일자리에 지원할 수 있습니다."};

  return {label:"근무 가능",icon:"⚪",pill:"pill-ready",title:"근무 가능",desc:"원하는 공고에 지원하면 오늘 일정이 이곳에 표시됩니다."};

  if(!selectedMapLocation){

    return;
  }

  const q=encodeURIComponent(selectedMapLocation);
  let url="";

  if(type==="naver"){

  }else if(type==="kakao"){
    url=`https://map.kakao.com/link/search/${q}`;
  }else{
    url=`https://www.google.com/maps/search/?api=1&query=${q}`;

  window.open(url,"_blank");
  closeMapChoice();
}

function renderJobs(){
  const el=document.getElementById("jobsList");
  if(!el)return;

  const filteredJobs =
  role==="manager"
    ? jobs.filter(j=>j.company_id===companyId)
    : jobs;

  el.innerHTML=filteredJobs.length
  ? filteredJobs.map(j=>{
    const myApplication=applications.find(a=>Number(a.job_id)===Number(j.id) && a.phone===workerPhone);
    const already=!!myApplication;

    return `
    <div class="card">
      <div class="job-head">
        <div>
          <div class="job-title">${j.title}</div>
          <div class="type">${j.type}</div>
        </div>
        <div class="badge">₩${won(j.salary)}</div>
      </div>
      <div class="info">📍 ${j.location}</div>
      <div class="info">🕒 ${j.work_time}</div>
      <div class="info">👥 ${j.applied||0}/${j.needed}명 지원</div>
      <div class="info">🌐 ${j.language}</div>

      ${role==="worker"
        ? `<button class="full ${already?'gray':'blue'}" onclick="applyJob(${j.id})">
            ${already?`지원 ${myApplication.status || "완료"}`:'지원하기'}
          </button>`
        : ""
      }

      ${role==="master"
        ? `<button class="full red" onclick="deleteJob(${j.id})">삭제하기</button>`
        : ""
      }
    </div>`;
  }).join("")
  : `<div class="card"><div class="title">공고가 없습니다</div><div class="sub">관리자 앱에서 공고를 생성하세요.</div></div>`;
}

async function applyJob(jobId){
  if(applications.some(a=>a.phone===workerPhone)){
    return alert("이미 다른 공고에 지원했습니다. 한 번에 하나의 공고만 지원할 수 있습니다.");
  }

  const job=jobs.find(j=>Number(j.id)===Number(jobId));

  if(!job){
    return alert("공고를 찾을 수 없습니다.");
  }

  const {error}=await db.from("applications").insert({
    job_id:jobId,
    worker_name:workerName || "이름없음",
    phone:workerPhone || "번호없음",
    company_id:job.company_id,
    status:"지원"
  });

  if(error){
    return alert("지원 저장 오류: "+error.message);
  }

  await db.from("jobs").update({
    applied:(job.applied||0)+1
  }).eq("id",jobId);

  await loadData();
  alert("지원 완료!");
}
async function deleteJob(jobId){
  if(!confirm("이 공고를 삭제할까요?")){
    return;
  }

  const {error}=await db.from("jobs").delete().eq("id",jobId);

  if(error){
    alert("삭제 오류: "+error.message);
    return;
  }

  await loadData();
  alert("공고가 삭제되었습니다.");
}

async function saveAttendance(job){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){
      reject("GPS를 지원하지 않는 기기입니다.");
      return;
    }

    if(!workerName || !workerPhone){
      reject("근로자 정보 등록 후 출근할 수 있습니다.");
      return;
    }

    const myApplication=applications.find(
      a=>Number(a.job_id)===Number(job.id) && a.phone===workerPhone
    );

    if(!myApplication){
      reject("지원한 공고만 출근할 수 있습니다.");
      return;
    }

    if((myApplication.status || "지원")!=="승인"){
      reject("관리자 승인 후 출근할 수 있습니다.");
      return;
    }

    const alreadyCheckedIn=attendance.some(
      a=>Number(a.job_id)===Number(job.id) && a.phone===workerPhone
    );

    if(alreadyCheckedIn){
      reject("이미 출근 처리된 공고입니다.");
      return;
    }

    navigator.geolocation.getCurrentPosition(async position=>{
      const lat=position.coords.latitude;
      const lng=position.coords.longitude;
      const gps=`${lat},${lng}`;

      const {error}=await db.from("attendance").insert({
        job_id:job.id,
        worker_name:workerName || "이름없음",
        phone:workerPhone || "번호없음",
        job_title:job.title,
        amount:job.salary,
        company_id:job.company_id,
        gps:gps
      });

      if(error){
        reject(error.message);
        return;
      }

      if(workerPhone){
        await db
          .from("applications")
          .update({status:"출근완료"})
          .eq("job_id",job.id)
          .eq("phone",workerPhone);
      }

      resolve(gps);
    },()=>{
      reject("GPS 권한이 필요합니다.");
    });
  });
}

async function completeQR(){
  if(lastRole==="worker"){
    const approvedApplication=applications.find(a=>(a.status || "지원")==="승인");

    if(!approvedApplication){
      return alert("관리자 승인 완료된 공고만 출근할 수 있습니다.");
    }

    const job=jobs.find(j=>Number(j.id)===Number(approvedApplication.job_id));

    if(!job){
      return alert("출근할 공고를 찾을 수 없습니다.");
    }

    try{
      await saveAttendance(job);
      await loadData();
      alert("GPS 출근 완료!");
      goHome();
    }catch(e){
      alert(e);
    }
  }else{
    alert("관리자 QR이 생성되었습니다. 근로자가 스캔하면 출근 처리됩니다.");
    goHome();
  }
}

async function autoCheckIn(){
  const params=new URLSearchParams(location.search);
  const checkin=params.get("checkin");

  if(checkin){
    role="worker";
    lastRole="worker";
    localStorage.setItem("crew_role","worker");

    if(!workerName || !workerPhone){
      localStorage.setItem("pending_checkin",checkin);
      alert("근로자 정보 등록 후 출근할 수 있습니다.");
      goScreen("workerInfoScreen");
      return;
    }

    await loadData();
    const job=jobs.find(j=>Number(j.id)===Number(checkin));

    if(!job){
      alert("공고를 찾을 수 없습니다.");
      location.href=location.origin+location.pathname;
      return;
    }

    try{
      await saveAttendance(job);
      alert("QR + GPS 출근 완료!");
      location.href=location.origin+location.pathname;
    }catch(e){
      alert(e);
      location.href=location.origin+location.pathname;
    }
  }
}

function sameApplication(a,target){
  const id=String(target.id || "").trim();
  const jobId=String(target.job_id || "").trim();
  const phone=String(target.phone || "").trim();

  if(id && String(a.id)===id)return true;

  if(
    jobId &&
    phone &&
    String(a.job_id)===jobId &&
    String(a.phone || "")===phone
  ){
    return true;
  }

  return false;
}

async function saveApplicationStatus(app,status){
  let lastError=null;

  if(app.id!==undefined && app.id!==null && String(app.id).trim()!==""){
    const r1=await db
      .from("applications")
      .update({status:status})
      .eq("id",String(app.id));

    if(r1.error)lastError=r1.error;
  }

  if(app.job_id!==undefined && app.phone){
    const r2=await db
      .from("applications")
      .update({status:status})
      .eq("job_id",app.job_id)
      .eq("phone",app.phone);

    if(r2.error)lastError=r2.error;
  }

  if(lastError){
    alert(status+" 저장 오류: "+lastError.message);
    return false;
  }

  return true;
}

async function changeApplicationStatusByIndex(index,status){
  const app=managerPendingApplications[Number(index)];

  if(!app){
    alert("화면의 지원자를 찾지 못했습니다. 새로고침 후 다시 시도하세요.");
    return;
  }

  applications=applications.map(a=>{
    if(sameApplication(a,app)){
      return {...a,status:status};
    }
    return a;
  });

  renderManager();

  const saved=await saveApplicationStatus(app,status);

  if(saved){
    alert(status+" 완료");
    await loadData();
    renderManager();
  }
}
