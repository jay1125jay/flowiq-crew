
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowIQ Crew v11.0</title>
<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial,sans-serif;
  padding:18px;
}
.board{
  background:#111827;
  border:1px solid rgba(34,197,94,.25);
  border-radius:24px;
  padding:18px;
  margin-bottom:18px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
.tile{
  background:#0f172a;
  border-radius:18px;
  padding:14px;
}
.tile span{
  display:block;
  color:#94a3b8;
  font-size:12px;
}
.tile b{
  font-size:16px;
}
.badge{
  display:inline-block;
  margin-top:12px;
  padding:7px 12px;
  border-radius:999px;
  background:rgba(34,197,94,.18);
  color:#86efac;
  font-weight:700;
}
</style>
</head>
<body>

<div class="board">
  <h2>🟢 FlowIQ Crew v11.0</h2>
  <p>실시간 운영 코어 안정화 빌드</p>

  <div class="grid">
    <div class="tile">
      <span>실시간 운영</span>
      <b>LIVE</b>
    </div>

    <div class="tile">
      <span>모바일 상태</span>
      <b>READY</b>
    </div>

    <div class="tile">
      <span>관리자 관제</span>
      <b>STABLE</b>
    </div>

    <div class="tile">
      <span>근로자 흐름</span>
      <b>SYNCED</b>
    </div>
  </div>

  <div class="badge">FlowIQ Crew · v11.0</div>
</div>

<script>
const APP_VERSION = "FlowIQ Crew v11.0 live-operations-core";
console.log(APP_VERSION);
</script>

</body>
</html>
