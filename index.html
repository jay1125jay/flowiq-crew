<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowIQ Crew MVP</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #020617; color: white; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; padding: 22px 16px 92px; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .brand { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .tagline { color: #94a3b8; font-size: 14px; margin-top: 3px; }
    .icon-box { width: 48px; height: 48px; border-radius: 18px; background: rgba(37, 99, 235, 0.18); display: flex; align-items: center; justify-content: center; color: #93c5fd; font-size: 24px; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 26px; padding: 20px; margin-bottom: 14px; box-shadow: 0 18px 50px rgba(0,0,0,0.25); }
    .title { font-size: 21px; font-weight: 800; margin-bottom: 6px; }
    .sub { color: #94a3b8; font-size: 14px; line-height: 1.45; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    button { border: 0; color: white; background: #1e293b; border-radius: 22px; min-height: 56px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform .08s, background .15s; }
    button:active { transform: scale(.98); }
    .blue { background: #2563eb; } .blue:hover { background: #3b82f6; }
    .green { background: #059669; } .green:hover { background: #10b981; }
    .gray { background: #334155; }
    .red { background: #dc2626; }
    .big { min-height: 78px; font-size: 18px; width: 100%; margin-bottom: 12px; }
    .action { min-height: 96px; background: #0f172a; border: 1px solid #1e293b; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
    .action .emoji { font-size: 26px; }
    .section { font-size: 19px; font-weight: 800; margin: 20px 0 12px; }
    .job-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .job-title { font-size: 18px; font-weight: 800; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 12px; background: rgba(16, 185, 129, .16); color: #6ee7b7; font-size: 13px; font-weight: 800; white-space: nowrap; }
    .type { color: #93c5fd; font-size: 12px; margin-top: 6px; font-weight: 700; }
    .info { color: #cbd5e1; font-size: 14px; margin: 9px 0; }
    .full { width: 100%; }
    .metric-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
    .metric { background: rgba(2, 6, 23, .55); border-radius: 18px; padding: 14px 8px; text-align: center; }
    .metric b { display: block; font-size: 22px; margin-bottom: 3px; }
    .metric span { color: #94a3b8; font-size: 12px; }
    .worker-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .worker-name { font-weight: 800; }
    .worker-meta { color: #94a3b8; font-size: 13px; margin-top: 4px; }
    .status { padding: 7px 10px; border-radius: 12px; font-size: 13px; font-weight: 800; }
    .ok { background: rgba(16,185,129,.16); color: #6ee7b7; } .late { background: rgba(234,179,8,.16); color: #fde68a; } .no { background: rgba(239,68,68,.16); color: #fca5a5; } .wait { background: rgba(59,130,246,.16); color: #93c5fd; }
    .qr-box { width: 230px; height: 230px; margin: 18px auto; background: white; color: #020617; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 132px; }
    .notice { background: rgba(37,99,235,.13); border: 1px solid rgba(59,130,246,.25); }
    .hidden { display: none; }
    .back { width: 100%; margin-top: 12px; background: #334155; }
    input, select { width: 100%; min-height: 52px; margin: 7px 0 12px; padding: 0 14px; border-radius: 16px; border: 1px solid #334155; background: #020617; color: white; font-size: 15px; }
    label { display: block; color: #cbd5e1; font-size: 13px; font-weight: 700; }
    .bottom-nav { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); width: calc(100% - 24px); max-width: 430px; background: rgba(15,23,42,.94); border: 1px solid #1e293b; border-radius: 26px; padding: 10px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; box-shadow: 0 12px 45px rgba(0,0,0,.45); backdrop-filter: blur(12px); }
    .bottom-nav button { min-height: 52px; border-radius: 18px; font-size: 12px; background: #020617; color: #cbd5e1; }
    .bottom-nav button.active { background: #2563eb; color: white; }
    .top-actions { display: flex; gap: 8px; margin-bottom: 14px; }
    .top-actions button { flex: 1; min-height: 44px; border-radius: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><div><div class="brand">FlowIQ Crew</div><div class="tagline">One Crew. Any Language.</div></div><div class="icon-box">🌐</div></header>
    <div class="top-actions hidden" id="topActions"><button class="gray" onclick="goBackInApp()">← 뒤로</button><button class="gray" onclick="goRoleHome()">홈</button><button class="red" onclick="resetData()">초기화</button></div>
    <section id="languageScreen"><div class="card notice"><div class="title">언어 선택</div><div class="sub">Choose your language. 현장 근로자와 관리자가 같은 시스템에서 소통합니다.</div></div><div class="grid2" id="languageGrid"></div></section>
    <section id="roleScreen" class="hidden"><div class="card notice"><div class="title">시작하기</div><div class="sub">근로자 또는 현장관리자로 접속하세요.</div></div><button class="big blue" onclick="selectRole('worker')">👷 근로자 앱</button><button class="big green" onclick="selectRole('manager')">🏗️ 관리자 앱</button></section>
    <section id="workerScreen" class="hidden"><div class="card"><div class="job-head"><div><div class="sub">오늘 상태</div><div class="title">근무 가능</div></div><div style="font-size:36px">✅</div></div></div><div class="grid3"><button class="action" onclick="goScreen('workerScreen')"><span class="emoji">💼</span>일자리</button><button class="action" onclick="showQR('worker')"><span class="emoji">📷</span>출근</button><button class="action" onclick="showPayroll()"><span class="emoji">💳</span>급여</button></div><div class="section">추천 일자리</div><div id="jobsList"></div><button class="back" onclick="goScreen('roleScreen')">← 역할 선택</button></section>
    <section id="managerScreen" class="hidden"><div class="card notice"><div class="sub">오늘 현장</div><div class="title">성수 물류센터</div><div class="metric-wrap"><div class="metric"><b id="mChecked">0</b><span>출근</span></div><div class="metric"><b id="mApplied">0</b><span>지원</span></div><div class="metric"><b id="mJobs">0</b><span>공고</span></div></div></div><div class="grid2"><button class="blue" onclick="goScreen('jobFormScreen')">＋ 공고 생성</button><button class="green" onclick="showQR('manager')">▦ 출근 QR</button></div><div class="section">지원/근로자 현황</div><div id="workersList"></div><button class="back" onclick="goScreen('roleScreen')">← 역할 선택</button></section>
    <section id="jobFormScreen" class="hidden"><div class="card notice"><div class="title">새 공고 생성</div><div class="sub">1인 운영을 위해 꼭 필요한 정보만 입력합니다.</div></div><div class="card"><label>공고명</label><input id="fTitle" placeholder="예: 성수 물류센터 상하차" /><label>위치</label><input id="fLocation" placeholder="예: 서울 성동구 성수동" /><label>근무 시간</label><input id="fTime" placeholder="예: 08:00 - 18:00" /><label>일급</label><input id="fSalary" type="number" placeholder="예: 150000" /><label>필요 인원</label><input id="fNeeded" type="number" placeholder="예: 8" /><label>작업 종류</label><select id="fType"><option>물류</option><option>건설</option><option>공장</option><option>행사</option><option>기타</option></select><label>지원 언어</label><input id="fLang" placeholder="예: 한국어 / Монгол / English" /><button class="full blue" onclick="createJob()">공고 저장</button></div><button class="back" onclick="goScreen('managerScreen')">← 관리자 홈</button></section>
    <section id="payrollScreen" class="hidden"><div class="card notice"><div class="title">급여</div><div class="sub">출근 기록 기반으로 예상 급여가 자동 계산됩니다.</div></div><div id="payrollList"></div><button class="back" onclick="goScreen('workerScreen')">← 근로자 홈</button></section>
    <section id="qrScreen" class="hidden"><div class="card" style="text-align:center"><div class="title" id="qrTitle">출근 QR</div><div class="qr-box" id="qrIcon">▦</div><div class="sub" id="qrDesc">근로자가 이 QR을 스캔하면 출근 처리됩니다.</div><button class="full green" onclick="completeQR()" style="margin-top:18px">✅ 완료</button></div><button class="back" onclick="goHome()">← 돌아가기</button></section>
  </main>
  <nav class="bottom-nav" id="bottomNav"><button id="navHome" onclick="goRoleHome()">홈</button><button id="navJobs" onclick="navPrimary()">일자리</button><button id="navQR" onclick="showQR(role || lastRole || 'worker')">QR</button><button id="navPay" onclick="navSecondary()">급여</button></nav>
  <script>
    const languages=["한국어","English","Монгол","Tiếng Việt","ไทย","中文","Русский","नेपाली","Oʻzbek"];
    const defaultJobs=[{id:1,title:"성수 물류센터 상하차",location:"서울 성동구 성수동",time:"08:00 - 18:00",salary:150000,needed:8,applied:5,lang:"한국어 / Монгол / English",type:"물류"},{id:2,title:"하남 공장 포장 보조",location:"경기 하남시",time:"09:00 - 17:00",salary:120000,needed:6,applied:3,lang:"한국어 / Tiếng Việt",type:"공장"},{id:3,title:"판교 현장 자재 정리",location:"경기 성남시 분당구",time:"07:00 - 16:00",salary:160000,needed:10,applied:7,lang:"한국어 / Русский / Oʻzbek",type:"건설"}];
    const defaultWorkers=[{name:"Bataa",lang:"Монгол",status:"출근",score:96},{name:"Minh",lang:"Tiếng Việt",status:"출근",score:91},{name:"Sergey",lang:"Русский",status:"지각",score:82},{name:"Ali",lang:"Oʻzbek",status:"미출근",score:74}];
    let role=localStorage.getItem("crew_role")||null,lastRole=role,currentScreen="languageScreen";
    let jobs=JSON.parse(localStorage.getItem("crew_jobs")||"null")||defaultJobs,workers=JSON.parse(localStorage.getItem("crew_workers")||"null")||defaultWorkers,applications=JSON.parse(localStorage.getItem("crew_applications")||"[]"),attendance=JSON.parse(localStorage.getItem("crew_attendance")||"[]");
    const screens=["languageScreen","roleScreen","workerScreen","managerScreen","jobFormScreen","payrollScreen","qrScreen"];
    function show(id,push=false){currentScreen=id;screens.forEach(s=>document.getElementById(s).classList.add("hidden"));document.getElementById(id).classList.remove("hidden");document.getElementById("topActions").classList.toggle("hidden",id==="languageScreen");document.getElementById("bottomNav").style.display=["workerScreen","managerScreen","jobFormScreen","payrollScreen","qrScreen"].includes(id)?"grid":"none";if(id==="managerScreen")renderManager();if(id==="workerScreen")renderJobs();if(id==="payrollScreen")renderPayroll();updateNav();if(push)history.pushState({screen:id},"","#"+id)}
    function goScreen(id){show(id,true)} function saveAll(){localStorage.setItem("crew_jobs",JSON.stringify(jobs));localStorage.setItem("crew_workers",JSON.stringify(workers));localStorage.setItem("crew_applications",JSON.stringify(applications));localStorage.setItem("crew_attendance",JSON.stringify(attendance));if(role)localStorage.setItem("crew_role",role)} function won(n){return Number(n).toLocaleString("ko-KR")+"원"}
    function init(){document.getElementById("languageGrid").innerHTML=languages.map(l=>`<button onclick="selectLanguage('${l}')">${l}</button>`).join("");renderJobs();renderManager();const savedLanguage=localStorage.getItem("crew_language");if(location.hash&&screens.includes(location.hash.replace("#","")))show(location.hash.replace("#",""),false);else if(savedLanguage&&role)show(role==="manager"?"managerScreen":"workerScreen",false);else if(savedLanguage)show("roleScreen",false);else show("languageScreen",false);history.replaceState({screen:currentScreen},"","#"+currentScreen)}
    function selectLanguage(language){localStorage.setItem("crew_language",language);goScreen("roleScreen")}
    function selectRole(selected){role=selected;lastRole=selected;localStorage.setItem("crew_role",selected);goScreen(selected==="worker"?"workerScreen":"managerScreen")}
    function renderJobs(){document.getElementById("jobsList").innerHTML=jobs.map(j=>{const already=applications.some(a=>a.jobId===j.id);return `<div class="card"><div class="job-head"><div><div class="job-title">${j.title}</div><div class="type">${j.type}</div></div><div class="badge">₩${won(j.salary)}</div></div><div class="info">📍 ${j.location}</div><div class="info">🕒 ${j.time}</div><div class="info">👥 ${j.applied}/${j.needed}명 지원</div><div class="info">🌐 ${j.lang}</div><button class="full ${already?'gray':'blue'}" onclick="applyJob(${j.id})">${already?'지원 완료':'지원하기'}</button></div>`}).join("")}
    function applyJob(jobId){if(applications.some(a=>a.jobId===jobId))return alert("이미 지원한 공고입니다.");applications.push({id:Date.now(),jobId,workerName:"Demo Worker",status:"지원",createdAt:new Date().toLocaleString()});const job=jobs.find(j=>j.id===jobId);if(job)job.applied+=1;saveAll();renderJobs();alert("지원 완료! 관리자 화면에서 확인할 수 있습니다.")}
    function renderManager(){document.getElementById("mChecked").innerText=attendance.length;document.getElementById("mApplied").innerText=applications.length;document.getElementById("mJobs").innerText=jobs.length;const appRows=applications.map(a=>{const job=jobs.find(j=>j.id===a.jobId);return `<div class="card"><div class="worker-row"><div><div class="worker-name">${a.workerName}</div><div class="worker-meta">지원 공고: ${job?job.title:'삭제된 공고'} · ${a.createdAt}</div></div><div class="status wait">지원</div></div></div>`}).join("");const workerRows=workers.map(w=>{const cls=w.status==="출근"?"ok":w.status==="지각"?"late":"no";return `<div class="card"><div class="worker-row"><div><div class="worker-name">${w.name}</div><div class="worker-meta">${w.lang} · 신뢰점수 ${w.score}</div></div><div class="status ${cls}">${w.status}</div></div></div>`}).join("");document.getElementById("workersList").innerHTML=(appRows||"")+workerRows}
    function createJob(){const title=document.getElementById("fTitle").value.trim(),location=document.getElementById("fLocation").value.trim(),time=document.getElementById("fTime").value.trim(),salary=Number(document.getElementById("fSalary").value||0),needed=Number(document.getElementById("fNeeded").value||0),type=document.getElementById("fType").value,lang=document.getElementById("fLang").value.trim()||"한국어";if(!title||!location||!time||!salary||!needed)return alert("공고명, 위치, 시간, 일급, 필요 인원을 입력하세요.");jobs.unshift({id:Date.now(),title,location,time,salary,needed,applied:0,lang,type});saveAll();["fTitle","fLocation","fTime","fSalary","fNeeded","fLang"].forEach(id=>document.getElementById(id).value="");alert("공고가 저장되었습니다. 근로자 앱에서 바로 보입니다.");goScreen("managerScreen")}
    function showQR(selectedRole){lastRole=selectedRole;if(selectedRole==="manager"){document.getElementById("qrTitle").innerText="출근 QR";document.getElementById("qrIcon").innerText="▦";document.getElementById("qrDesc").innerText="근로자가 관리자 폰의 QR을 스캔하면 출근 처리됩니다."}else{document.getElementById("qrTitle").innerText="QR 스캔";document.getElementById("qrIcon").innerText="⌖";document.getElementById("qrDesc").innerText="현장관리자 폰의 QR을 스캔하세요. GPS와 시간이 함께 기록됩니다."}goScreen("qrScreen")}
    function completeQR(){if(lastRole==="worker"){const job=jobs[0];attendance.push({id:Date.now(),jobId:job.id,jobTitle:job.title,amount:job.salary,time:new Date().toLocaleString(),gps:"테스트 GPS"});saveAll();alert("출근 처리 완료! 급여 화면과 관리자 화면에 반영됩니다.")}else alert("관리자 QR이 생성되었습니다. 근로자가 스캔하면 출근 처리됩니다.");goHome()}
    function showPayroll(){goScreen("payrollScreen")}
    function renderPayroll(){document.getElementById("payrollList").innerHTML=attendance.length?attendance.map(a=>`<div class="card"><div class="job-head"><div><div class="job-title">${a.jobTitle}</div><div class="type">출근 완료</div></div><div class="badge">₩${won(a.amount)}</div></div><div class="info">🕒 ${a.time}</div><div class="info">📍 ${a.gps}</div><div class="info">💳 지급 대기</div></div>`).join(""):`<div class="card"><div class="title">아직 급여 기록이 없습니다</div><div class="sub">출근 QR을 완료하면 급여 기록이 생성됩니다.</div></div>`}
    function goHome(){goScreen(lastRole==="manager"?"managerScreen":"workerScreen")} function goRoleHome(){if(role==="manager")goScreen("managerScreen");else if(role==="worker")goScreen("workerScreen");else goScreen("roleScreen")} function goBackInApp(){history.back()} function navPrimary(){if(role==="manager")goScreen("jobFormScreen");else goScreen("workerScreen")} function navSecondary(){if(role==="manager")goScreen("managerScreen");else showPayroll()}
    function updateNav(){document.getElementById("navJobs").innerText=role==="manager"?"공고":"일자리";document.getElementById("navPay").innerText=role==="manager"?"현황":"급여";["navHome","navJobs","navQR","navPay"].forEach(id=>document.getElementById(id).classList.remove("active"));if(["workerScreen","managerScreen"].includes(currentScreen))document.getElementById("navHome").classList.add("active");if(currentScreen==="jobFormScreen")document.getElementById("navJobs").classList.add("active");if(currentScreen==="qrScreen")document.getElementById("navQR").classList.add("active");if(currentScreen==="payrollScreen")document.getElementById("navPay").classList.add("active")}
    function resetData(){if(!confirm("테스트 데이터를 초기화할까요? 생성한 공고, 지원, 출근 기록이 삭제됩니다."))return;localStorage.removeItem("crew_jobs");localStorage.removeItem("crew_workers");localStorage.removeItem("crew_applications");localStorage.removeItem("crew_attendance");jobs=defaultJobs;workers=defaultWorkers;applications=[];attendance=[];saveAll();alert("초기화 완료");goRoleHome()}
    window.onpopstate=function(event){const id=event.state&&event.state.screen?event.state.screen:location.hash.replace("#","");if(screens.includes(id))show(id,false)};init();
  </script>
</body>
</html>
