<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowIQ Crew MVP</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at top left,rgba(59,130,246,.16),transparent 32%),
    radial-gradient(circle at bottom right,rgba(168,85,247,.12),transparent 28%),
    #020617;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  overflow-x:hidden;
}
body{display:flex;justify-content:center}
.app{
  width:100%;
  max-width:440px;
  min-height:100vh;
  padding:26px 18px 110px;
}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.brand{
  font-size:30px;
  font-weight:900;
  letter-spacing:-1px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.tagline{
  color:#94a3b8;
  font-size:13px;
  margin-top:5px;
  letter-spacing:.3px;
}
.icon-box{width:48px;height:48px;border-radius:18px;background:rgba(37,99,235,.18);display:flex;align-items:center;justify-content:center;font-size:24px}
.card{
  background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
  border:1px solid rgba(255,255,255,.05);
  border-radius:30px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
}
.title{font-size:21px;font-weight:800;margin-bottom:6px}
.sub{color:#94a3b8;font-size:14px;line-height:1.45}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
button{
  border:0;
  color:white;
  background:#1e293b;
  border-radius:24px;
  min-height:58px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.18s ease;
  box-shadow:0 6px 20px rgba(0,0,0,.22);
}

button:active{
  transform:scale(.98);
}
.blue{background:#2563eb}.green{background:#059669}.gray{background:#334155}.red{background:#dc2626}
.big{min-height:78px;font-size:18px;width:100%;margin-bottom:12px}
.action{
  min-height:108px;
  background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
  border:1px solid rgba(255,255,255,.05);
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:center;
  justify-content:center;
  border-radius:28px;
  box-shadow:0 10px 26px rgba(0,0,0,.22);
}
.action .emoji{
  font-size:32px;
  filter:drop-shadow(0 4px 10px rgba(59,130,246,.25));
}
.section{
  font-size:22px;
  font-weight:900;
  margin:28px 0 14px;
  letter-spacing:-.5px;
}
.job-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  margin-bottom:14px;
}
.job-title{
  font-size:20px;
  font-weight:900;
  line-height:1.3;
  letter-spacing:-.4px;
}
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:88px;
  height:42px;
  padding:0 16px;
  border-radius:18px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  font-size:14px;
  font-weight:900;
  box-shadow:0 8px 20px rgba(37,99,235,.35);
}
.type{
  display:inline-flex;
  align-items:center;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(59,130,246,.14);
  color:#93c5fd;
  font-size:12px;
  margin-top:8px;
  font-weight:800;
}
.info{
  color:#cbd5e1;
  font-size:14px;
  margin:12px 0;
  line-height:1.5;
}
.full{width:100%}
.metric-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.metric{
  background:rgba(15,23,42,.92);
  border-radius:24px;
  padding:18px 10px;
  text-align:center;
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.metric b{
  display:block;
  font-size:28px;
  font-weight:900;
  margin-bottom:4px;
  letter-spacing:-1px;
}
.metric span{color:#94a3b8;font-size:12px}
.worker-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.worker-name{font-weight:800}
.worker-meta{color:#94a3b8;font-size:13px;margin-top:4px}
.status{
  width:78px;
  height:78px;
  border-radius:22px;
  font-size:20px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:6px;
}

.ok{
  background:rgba(37,99,235,.22);
  color:#60a5fa;
}

.wait{
  background:rgba(59,130,246,.16);
  color:#93c5fd;
}
.notice{
  background:linear-gradient(135deg,rgba(37,99,235,.18),rgba(59,130,246,.08));
  border:1px solid rgba(96,165,250,.22);
  box-shadow:0 10px 30px rgba(37,99,235,.12);
}
.hidden{display:none}
.back{width:100%;margin-top:12px;background:#334155}
input,select{
  width:100%;
  min-height:56px;
  margin:8px 0 14px;
  padding:0 16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(15,23,42,.92);
  color:white;
  font-size:15px;
  outline:none;
  transition:.18s ease;
}

input:focus,
select:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 4px rgba(59,130,246,.15);
}
label{display:block;color:#cbd5e1;font-size:13px;font-weight:700}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 14px}
.lang-option{display:flex;align-items:center;gap:8px;background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;color:#e2e8f0;font-size:14px;font-weight:700}
.lang-option input{width:auto;min-height:auto;margin:0}
.qr-box{
  width:240px;
  height:240px;
  margin:24px auto;
  background:white;
  color:#020617;
  border-radius:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:132px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  padding:14px;
}
.bottom-nav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:calc(100% - 24px);max-width:430px;background:rgba(15,23,42,.94);border:1px solid #1e293b;border-radius:26px;padding:10px;display:none;grid-template-columns:repeat(4,1fr);gap:8px}
.bottom-nav button{
  min-height:58px;
  border-radius:20px;
  font-size:12px;
  background:#020617;
  color:#cbd5e1;
  font-weight:700;
  border:1px solid rgba(255,255,255,.04);
}

.bottom-nav button.active{
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  box-shadow:0 8px 22px rgba(37,99,235,.38);
}
.bottom-nav button.active{background:#2563eb;color:white}
.top-actions{display:flex;gap:8px;margin-bottom:14px}
.top-actions button{
  flex:1;
  min-height:46px;
  border-radius:18px;
  font-size:13px;
  font-weight:800;
  background:rgba(15,23,42,.92);
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 6px 18px rgba(0,0,0,.18);
}
#languageGrid button{background:linear-gradient(180deg,#0f172a 0%,#111827 100%);border:1px solid rgba(255,255,255,.05);}
</style>
</head>

<body>
<main class="app">
<header class="top">
  <div>
    <div class="brand">FlowIQ Crew</div>
    <div class="tagline">One Crew. Any Language.</div>
  </div>
  <div class="icon-box">🌐</div>
</header>

<div class="top-actions hidden" id="topActions">
  <button class="gray" onclick="history.back()">← 뒤로</button>
  <button class="gray" onclick="goRoleSelect()">역할변경</button>
  <button class="red" onclick="refreshData()">새로고침</button>
</div>

<section id="languageScreen">
  <div class="card notice">
    <div class="title">언어 선택</div>
    <div class="sub">Choose your language.</div>
  </div>
  <div class="grid2" id="languageGrid"></div>
  </section>

<section id="roleScreen" class="hidden">
  <div class="card notice">
    <div class="title">시작하기</div>
    <div class="sub">근로자 또는 업체관리자로 접속하세요.</div>
  </div>
  <button class="big blue" onclick="selectRole('worker')">👷 근로자 앱</button>

<button class="big green" onclick="selectRole('manager')">🏗️ 업체 관리자</button>

<button class="big red" onclick="selectRole('master')">🛡️ FlowIQ MASTER</button>
</section>
<section id="workerInfoScreen" class="hidden">
  <div class="card notice">
    <div class="title">근로자 정보</div>
    <div class="sub">이름과 연락처를 입력하세요.</div>
  </div>

  <div class="card">
    <label>이름</label>
    <input id="workerNameInput" placeholder="예: 바타르">

    <label>연락처</label>
    <input id="workerPhoneInput" placeholder="예: 010-1234-5678">

    <button class="full blue" onclick="saveWorkerInfo()">저장 후 시작</button>
  </div>
</section>
<section id="workerScreen" class="hidden">
  <div class="card">
    <div class="job-head">
      <div>
        <div class="sub">오늘 상태</div>
        <div class="title">근무 가능</div>
      </div>
      <div style="font-size:36px">✅</div>
    </div>
  </div>

  <div class="grid3">
    <button class="action" onclick="goScreen('workerScreen')"><span class="emoji">💼</span>일자리</button>
    <button class="action" onclick="showQR('worker')"><span class="emoji">📷</span>출근</button>
    <button class="action" onclick="showPayroll()"><span class="emoji">💳</span>급여</button>
  </div>

  <div class="section">추천 일자리</div>
  <div id="jobsList"></div>
</section>

<section id="managerScreen" class="hidden">
  <div class="card notice">
    <div class="sub">오늘 현장</div>
    <div class="title" id="managerTitle">FlowIQ Crew DB</div>
    <div class="metric-wrap">
      <div class="metric"><b id="mChecked">0</b><span>출근</span></div>
      <div class="metric"><b id="mApplied">0</b><span>지원</span></div>
      <div class="metric"><b id="mJobs">0</b><span>공고</span></div>
    </div>
  </div>

  <div class="grid2">
    <button class="blue" onclick="goScreen('jobFormScreen')">＋ 공고 생성</button>
    <button class="green" onclick="showQR('manager')">▦ 출근 QR</button>
  </div>

  <div class="section">지원/출근 현황</div>
  <div id="workersList"></div>
</section>

<section id="jobFormScreen" class="hidden">
  <div class="card notice">
    <div class="title">새 공고 생성</div>
    <div class="sub">저장하면 Supabase DB에 바로 들어갑니다.</div>
  </div>

  <div class="card">
    <label>공고명</label>
    <input id="fTitle" placeholder="예: 성수 물류센터 상하차"/>

    <label>위치</label>
    <input id="fLocation" placeholder="예: 서울 성동구 성수동"/>

    <label>근무 시간</label>
    <input id="fTime" placeholder="예: 08:00 - 18:00"/>

    <label>일급</label>
    <input id="fSalary" type="number" placeholder="예: 150000"/>

    <label>필요 인원</label>
    <input id="fNeeded" type="number" placeholder="예: 8"/>

    <label>작업 종류</label>
    <select id="fType">
      <option>물류</option>
      <option>건설</option>
      <option>공장</option>
      <option>행사</option>
      <option>기타</option>
    </select>

    <label>지원 언어</label>
    <div class="lang-grid">
      <label class="lang-option"><input type="checkbox" class="langCheck" value="English">영어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="Монгол">몽골어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="Tiếng Việt">베트남어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="ไทย">태국어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="中文">중국어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="Русский">러시아어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="नेपाली">네팔어</label>
      <label class="lang-option"><input type="checkbox" class="langCheck" value="Oʻzbek">우즈베크어</label>
    </div>

    <button class="full blue" onclick="createJob()">공고 저장</button>
  </div>
</section>

<section id="payrollScreen" class="hidden">
  <div class="card notice">
    <div class="title">급여</div>
    <div class="sub">출근 기록 기반 예상 급여입니다.</div>
  </div>
  <div id="payrollList"></div>
</section>

<section id="qrScreen" class="hidden">
  <div class="card" style="text-align:center">
    <div class="title" id="qrTitle">출근 QR</div>
    <img id="qrImage" class="qr-box" alt="출근 QR"/>
    <div class="sub" id="qrDesc">근로자가 이 QR을 스캔하면 출근 처리됩니다.</div>
    <button class="full green" onclick="completeQR()" style="margin-top:18px">✅ 수동 출근 테스트</button>
  </div>
</section>
</main>

<nav class="bottom-nav" id="bottomNav">
  <button id="navHome" onclick="goHome()">홈</button>
  <button id="navJobs" onclick="navPrimary()">일자리</button>
  <button id="navQR" onclick="showQR(role||lastRole||'worker')">QR</button>
  <button id="navPay" onclick="navSecondary()">급여</button>
</nav>

<script>
const SUPABASE_URL="https://zhbzphvqiiijfjqnktlo.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoYnpwaHZxaWlpamZqcW5rdGxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDEwNTcsImV4cCI6MjA5NDYxNzA1N30.ufIPHJh2fzRLm5taos3yTz6pGlEHFKaSoYI2Ref3T5I";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const languages=["한국어","English","Монгол","Tiếng Việt","ไทย","中文","Русский","नेपाली","Oʻzbek"];
let role=localStorage.getItem("crew_role")||null;
let workerName=localStorage.getItem("worker_name")||"";
let workerPhone=localStorage.getItem("worker_phone")||"";
let lastRole=role;
let currentScreen="languageScreen";
let jobs=[];
let applications=[];
let attendance=[];
  
const MASTER_PASSWORD="1234";
const COMPANY_PASSWORDS={
  demo_company:"0000",
  alpha:"1111",
  beta:"2222"
};

const COMPANY_NAMES={
  demo_company:"FlowIQ Demo",
  alpha:"Alpha Logistics",
  beta:"Beta Factory"
};
  
let companyId=localStorage.getItem("company_id")||"demo_company";
const screens=["languageScreen","roleScreen","workerInfoScreen","workerScreen","managerScreen","jobFormScreen","payrollScreen","qrScreen"];

function won(n){return Number(n||0).toLocaleString("ko-KR")+"원"}

function show(id,push=false){
  currentScreen=id;
  screens.forEach(s=>document.getElementById(s).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.getElementById("topActions").classList.toggle("hidden",id==="languageScreen");
  document.getElementById("bottomNav").style.display=["workerScreen","managerScreen","jobFormScreen","payrollScreen","qrScreen"].includes(id)?"grid":"none";

  if(id==="workerScreen")renderJobs();
  if(id==="managerScreen")renderManager();
  if(id==="payrollScreen")renderPayroll();

  updateNav();
  if(push)history.pushState({screen:id},"","#"+id);
}

function goScreen(id){show(id,true)}
function selectLanguage(language){localStorage.setItem("crew_language",language);goScreen("roleScreen")}
async function selectRole(selected){
  role=selected;
  lastRole=selected;

  if(selected==="worker"){
    localStorage.setItem("crew_role","worker");

    if(!workerName || !workerPhone){
      goScreen("workerInfoScreen");
    }else{
      await loadData();
      goScreen("workerScreen");
    }

  }else if(selected==="manager"){
    const code=prompt("업체 코드를 입력하세요");

    if(!code){
      alert("업체 코드가 필요합니다.");
      return;
    }

    if(!COMPANY_PASSWORDS[code]){
      alert("존재하지 않는 업체 코드입니다.");
      return;
    }

    const password=prompt("업체 비밀번호 입력");

    if(password!==COMPANY_PASSWORDS[code]){
      alert("비밀번호가 틀렸습니다.");
      return;
    }

    role="manager";
    lastRole="manager";
    companyId=code;

    localStorage.setItem("crew_role","manager");
    localStorage.setItem("company_id",code);

    await loadData();
    goScreen("managerScreen");

  }else if(selected==="master"){
    const password=prompt("MASTER 비밀번호 입력");

    if(password!==MASTER_PASSWORD){
      alert("비밀번호가 틀렸습니다.");
      return;
    }

    role="master";
    lastRole="master";
    companyId="master";

    localStorage.setItem("crew_role","master");

    await loadData();
    goScreen("managerScreen");
    alert("MASTER MODE");
  }
}

function saveWorkerInfo(){
  const name=document.getElementById("workerNameInput").value.trim();
  const phone=document.getElementById("workerPhoneInput").value.trim();

  if(!name || !phone){
    alert("이름과 연락처를 입력하세요.");
    return;
  }

  workerName=name;
  workerPhone=phone;

  localStorage.setItem("worker_name",name);
  localStorage.setItem("worker_phone",phone);

  goScreen("workerScreen");
}
  async function loadData(){
  let jobsQuery=db.from("jobs").select("*");
  let applicationsQuery=db.from("applications").select("*");
  let attendanceQuery=db.from("attendance").select("*");

  if(role==="manager"){
  jobsQuery=jobsQuery.eq("company_id",companyId);
  applicationsQuery=applicationsQuery.eq("company_id",companyId);
  attendanceQuery=attendanceQuery.eq("company_id",companyId);
}

  const jr=await jobsQuery.order("created_at",{ascending:false});
  const ar=await applicationsQuery.order("created_at",{ascending:false});
  const tr=await attendanceQuery.order("created_at",{ascending:false});

  if(jr.error)alert("jobs 오류: "+jr.error.message);
  if(ar.error)alert("applications 오류: "+ar.error.message);
  if(tr.error)alert("attendance 오류: "+tr.error.message);

  jobs=jr.data||[];
  applications=ar.data||[];
  attendance=tr.data||[];

  renderJobs();
  renderManager();
  renderPayroll();
}

async function seedJobsIfEmpty(){
  await loadData();
  if(jobs.length>0)return;

  await db.from("jobs").insert([
    {title:"성수 물류센터 상하차",location:"서울 성동구 성수동",work_time:"08:00 - 18:00",salary:150000,needed:8,applied:5,language:"한국어 / Монгол / English",type:"물류",company_id:"demo_company"},
    {title:"하남 공장 포장 보조",location:"경기 하남시",work_time:"09:00 - 17:00",salary:120000,needed:6,applied:3,language:"한국어 / Tiếng Việt",type:"공장",company_id:"demo_company"},
    {title:"판교 현장 자재 정리",location:"경기 성남시 분당구",work_time:"07:00 - 16:00",salary:160000,needed:10,applied:7,language:"한국어 / Русский / Oʻzbek",type:"건설",company_id:"demo_company"}
  ]);

  await loadData();
}

function renderJobs(){
  const el=document.getElementById("jobsList");
  if(!el)return;

  const filteredJobs =
  role==="manager"
    ? jobs.filter(j=>j.company_id===companyId)
    : jobs;

  el.innerHTML=filteredJobs.length
  ? filteredJobs.map(j=>{
    const already=applications.some(a=>Number(a.job_id)===Number(j.id));

    return `
    <div class="card">
      <div class="job-head">
        <div>
          <div class="job-title">${j.title}</div>
          <div class="type">${j.type}</div>
        </div>
        <div class="badge">₩${won(j.salary)}</div>
      </div>
      <div class="info">📍 ${j.location}</div>
      <div class="info">🕒 ${j.work_time}</div>
      <div class="info">👥 ${j.applied||0}/${j.needed}명 지원</div>
      <div class="info">🌐 ${j.language}</div>

      ${role==="worker"
        ? `<button class="full ${already?'gray':'blue'}" onclick="applyJob(${j.id})">
            ${already?'지원 완료':'지원하기'}
          </button>`
        : ""
      }

      ${role==="master"
        ? `<button class="full red" onclick="deleteJob(${j.id})">삭제하기</button>`
        : ""
      }
    </div>`;
  }).join("")
  : `<div class="card"><div class="title">공고가 없습니다</div><div class="sub">관리자 앱에서 공고를 생성하세요.</div></div>`;
}

async function applyJob(jobId){
  if(applications.some(a=>a.phone===workerPhone)){
    return alert("이미 다른 공고에 지원했습니다. 한 번에 하나의 공고만 지원할 수 있습니다.");
  }

  const job=jobs.find(j=>Number(j.id)===Number(jobId));

  if(!job){
    return alert("공고를 찾을 수 없습니다.");
  }

  const {error}=await db.from("applications").insert({
    job_id:jobId,
    worker_name:workerName || "이름없음",
    phone:workerPhone || "번호없음",
    company_id:job.company_id,
    status:"지원"
  });

  if(error){
    return alert("지원 저장 오류: "+error.message);
  }

  await db.from("jobs").update({
    applied:(job.applied||0)+1
  }).eq("id",jobId);

  await loadData();
  alert("지원 완료!");
}
async function deleteJob(jobId){
  if(!confirm("이 공고를 삭제할까요?")){
    return;
  }

  const {error}=await db.from("jobs").delete().eq("id",jobId);

  if(error){
    alert("삭제 오류: "+error.message);
    return;
  }

  await loadData();
  alert("공고가 삭제되었습니다.");
}

  function renderManager(){
  if(!document.getElementById("mChecked"))return;

  const filteredJobs =
    role==="manager"
      ? jobs.filter(j=>j.company_id===companyId)
      : jobs;

  const filteredApplications =
    role==="manager"
      ? applications.filter(a=>a.company_id===companyId)
      : applications;

  const filteredAttendance =
    role==="manager"
      ? attendance.filter(a=>a.company_id===companyId)
      : attendance;

  document.getElementById("mChecked").innerText=filteredAttendance.length;
  document.getElementById("mApplied").innerText=filteredApplications.length;
  document.getElementById("mJobs").innerText=filteredJobs.length;

  if(role==="manager"){
    document.getElementById("managerTitle").innerText=
      COMPANY_NAMES[companyId] || companyId;
  }else{
    document.getElementById("managerTitle").innerText="FlowIQ MASTER";
  }

  const appRows=filteredApplications.map(a=>{
    const job=jobs.find(j=>Number(j.id)===Number(a.job_id));
    const status=a.status || "지원";

    return `
    <div class="card">
      <div class="worker-row">
        <div>
          <div class="worker-name">${a.worker_name} (${a.phone || "번호없음"})</div>
          <div class="worker-meta">지원 공고: ${job?job.title:'삭제된 공고'} · ${new Date(a.created_at).toLocaleString()}</div>
          <div class="info">상태: ${status}</div>
        </div>

        ${
          status === "지원"
          ? `
            <div style="display:flex;flex-direction:column;gap:8px">
              <button class="blue" onclick="approveApplication(${a.id})">승인</button>
              <button class="red" onclick="rejectApplication(${a.id})">거절</button>
            </div>
          `
          : `
            <div class="status ${status === "승인" ? "ok" : "wait"}">
              ${status}
            </div>
          `
        }
      </div>
    </div>`;
  }).join("");

  const attRows=filteredAttendance.map(a=>`
    <div class="card">
      <div class="worker-row">
        <div>
          <div class="worker-name">${a.worker_name} (${a.phone || "번호없음"})</div>
          <div class="worker-meta">${a.job_title} · GPS: ${a.gps} · ${new Date(a.created_at).toLocaleString()}</div>
        </div>
        <div class="status ok">출근</div>
      </div>
    </div>`).join("");

  document.getElementById("workersList").innerHTML=
    (attRows+appRows) ||
    `<div class="card"><div class="sub">아직 지원/출근 기록이 없습니다.</div></div>`;
}
  async function createJob(){
  const title=fTitle.value.trim();
  const location=fLocation.value.trim();
  const work_time=fTime.value.trim();
  const salary=Number(fSalary.value||0);
  const needed=Number(fNeeded.value||0);
  const type=fType.value;
  const selectedLangs=[...document.querySelectorAll(".langCheck:checked")].map(x=>x.value);
  const language=selectedLangs.length?"한국어 / "+selectedLangs.join(" / "):"한국어";

  if(!title||!location||!work_time||!salary||!needed)return alert("공고명, 위치, 시간, 일급, 필요 인원을 입력하세요.");

  const {error}=await db.from("jobs").insert({
    title,
location,
work_time,
salary,
needed,
applied:0,
language,
type,
company_id:companyId
  });

  if(error)return alert("공고 저장 오류: "+error.message);

  ["fTitle","fLocation","fTime","fSalary","fNeeded"].forEach(id=>document.getElementById(id).value="");
  document.querySelectorAll(".langCheck").forEach(x=>x.checked=false);

  await loadData();
  alert("공고가 저장되었습니다.");
  goScreen("managerScreen");
}
function showQR(selectedRole){
  lastRole=selectedRole;
  const qrImage=document.getElementById("qrImage");

  if(selectedRole==="manager"){
    qrTitle.innerText="출근 QR";
    const job=jobs[0];
    const qrData=job?`${location.origin}${location.pathname}?checkin=${job.id}`:`${location.origin}${location.pathname}`;
    qrImage.src=`https://api.qrserver.com/v1/create-qr-code/?size=230x230&data=${encodeURIComponent(qrData)}`;
    qrDesc.innerHTML=`근로자가 이 QR을 스캔하면 출근 처리됩니다.<br><br><button class="full blue" onclick="location.href='${qrData}'">출근 링크 테스트</button>`;
  }else{
    qrTitle.innerText="QR 스캔";
    qrImage.src=`https://api.qrserver.com/v1/create-qr-code/?size=230x230&data=${encodeURIComponent(location.href)}`;
    qrDesc.innerText="관리자 QR 링크로 접속하면 자동 출근 처리됩니다.";
  }

  goScreen("qrScreen");
}

async function saveAttendance(job){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){
      reject("GPS를 지원하지 않는 기기입니다.");
      return;
    }

    navigator.geolocation.getCurrentPosition(async position=>{
      const lat=position.coords.latitude;
      const lng=position.coords.longitude;
      const gps=`${lat},${lng}`;

      const {error}=await db.from("attendance").insert({
        job_id:job.id,
        worker_name:workerName || "이름없음",
phone:workerPhone || "번호없음",
        job_title:job.title,
        amount:job.salary,
        company_id:companyId,
        gps:gps
      });

      if(error)reject(error.message);
      else resolve(gps);
    },()=>{
      reject("GPS 권한이 필요합니다.");
    });
  });
}

async function completeQR(){
  if(lastRole==="worker"){
    const job=jobs[0];
    if(!job)return alert("출근할 공고가 없습니다.");

    try{
      await saveAttendance(job);
      await loadData();
      alert("GPS 출근 완료!");
      goHome();
    }catch(e){
      alert(e);
    }
  }else{
    alert("관리자 QR이 생성되었습니다. 근로자가 스캔하면 출근 처리됩니다.");
    goHome();
  }
}

async function autoCheckIn(){
  const params=new URLSearchParams(location.search);
  const checkin=params.get("checkin");

  if(checkin){
    await loadData();
    const job=jobs.find(j=>Number(j.id)===Number(checkin));

    if(!job){
      alert("공고를 찾을 수 없습니다.");
      return;
    }

    try{
      await saveAttendance(job);
      alert("QR + GPS 출근 완료!");
      location.href=location.origin+location.pathname;
    }catch(e){
      alert(e);
    }
  }
}

async function refreshData(){await loadData();alert("새로고침 완료")}

function goHome(){
  if(role==="manager" || role==="master"){
    goScreen("managerScreen");
  }else{
    goScreen("workerScreen");
  }
}

function goRoleSelect(){
  role=null;
  lastRole=null;
  localStorage.removeItem("crew_role");
  localStorage.removeItem("company_id");
  goScreen("roleScreen");
}

function goRoleHome(){
  goRoleSelect();
}
function navPrimary(){goScreen("workerScreen")}
function navSecondary(){
  if(role==="manager" || role==="master"){
    goScreen("managerScreen");
  }else{
    showPayroll();
  }
}

function updateNav(){

  if(role==="manager"){
    navJobs.innerText="공고";
    navPay.innerText="현황";

  }else if(role==="master"){
    navJobs.innerText="전체공고";
    navPay.innerText="전체현황";

  }else{
    navJobs.innerText="일자리";
    navPay.innerText="급여";
  }

  ["navHome","navJobs","navQR","navPay"]
    .forEach(id=>document.getElementById(id).classList.remove("active"));

  if(["workerScreen","managerScreen"].includes(currentScreen)){
    navHome.classList.add("active");
  }

  if(currentScreen==="jobFormScreen"){
    navJobs.classList.add("active");
  }

  if(currentScreen==="qrScreen"){
    navQR.classList.add("active");
  }

  if(currentScreen==="payrollScreen"){
    navPay.classList.add("active");
  }
}

window.onpopstate=e=>{
  const id=e.state&&e.state.screen?e.state.screen:location.hash.replace("#","");
  if(screens.includes(id))show(id,false);
};

async function init(){
  languageGrid.innerHTML=languages.map(l=>`<button onclick="selectLanguage('${l}')">${l}</button>`).join("");
  await seedJobsIfEmpty();

  const savedLanguage=localStorage.getItem("crew_language");

  if(savedLanguage&&role){
    if(role==="manager" || role==="master"){
      show("managerScreen",false);
    }else{
      show("workerScreen",false);
    }
  }else if(savedLanguage){
    show("roleScreen",false);
  }else{
    show("languageScreen",false);
  }

  history.replaceState({screen:currentScreen},"","#"+currentScreen);
  await autoCheckIn();
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./service-worker.js");
}

async function approveApplication(id){
  const {error}=await db
    .from("applications")
    .update({status:"승인"})
    .eq("id",id);

  if(error){
    return alert("승인 오류: "+error.message);
  }

  await loadData();
  alert("승인 완료");
}

async function rejectApplication(id){
  const {error}=await db
    .from("applications")
    .update({status:"거절"})
    .eq("id",id);

  if(error){
    return alert("거절 오류: "+error.message);
  }

  await loadData();
  alert("거절 완료");
}

init();
